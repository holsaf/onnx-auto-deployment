name: Deploy DEV

on:
  push:
    branches:
      - dev

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest

    env:
      MODEL_URL: ${{ secrets.MODEL_URL }}
      TEST_IMAGE_URL: ${{ secrets.TEST_IMAGE_URL }}
      PREDICTION_LOG_PATH: predictions_dev.txt

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download test data
        run: python scripts/download_test_data.py

      - name: Run tests
        run: pytest tests/

      - name: Copy project to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "~/onnx-auto-deployment-dev"

      - name: Build and deploy DEV container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/onnx-auto-deployment-dev
            docker stop onnx-api-dev || true
            docker rm onnx-api-dev || true
            docker build -t onnx-api-dev .
            docker run -d \
              --name onnx-api-dev \
              -p 8001:8000 \
              -e MODEL_URL="${{ secrets.MODEL_URL }}" \
              -e PREDICTION_LOG_PATH="predictions_dev.txt" \
              onnx-api-dev
